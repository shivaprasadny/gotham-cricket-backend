# ─── Production overrides (active when --spring.profiles.active=prod) ────────
# All secrets come from environment variables loaded by systemd via gotham.env.
# No secrets are hardcoded here.

# ─── Database ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate

# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}

# ─── Mail ────────────────────────────────────────────────────────────────────
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# ─── Swagger — disabled in production ────────────────────────────────────────
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# ─── CORS ────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://api.shivaprasadofficial.com}

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.gotham=INFO
logging.level.org.hibernate=WARN
logging.level.org.springframework=WARN

# ─── AWS S3 (profile images) ─────────────────────────────────────────────────
# Credentials via EC2 IAM role (DefaultCredentialsProvider) — no keys stored here
aws.s3.profile-bucket=gotham-profile-images
aws.region=us-east-1
