spring.application.name=gotham-cricket-backend

# ─── Database ───────────────────────────────────────────────────────────────
# Local defaults kick in when DB_URL / DB_USER / DB_PASSWORD are not set.
# On EC2 set those env vars (or export from .env) and the defaults are ignored.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/gotham_cricket_club?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:12345678}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ─── JWT ─────────────────────────────────────────────────────────────────────
# Default is the original dev key — override JWT_SECRET on EC2 with a strong key.
jwt.secret=${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvckp3dFRva2VuMTIzNDU2Nzg5MDEyMzQ1Njc4OTA=}
jwt.expiration=${JWT_EXPIRATION:1296000000}

# ─── Mail ────────────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── Server ──────────────────────────────────────────────────────────────────
server.address=0.0.0.0
server.port=${SERVER_PORT:8080}

# ─── WebSocket ───────────────────────────────────────────────────────────────
# React Native does not send an Origin header, so * is needed for mobile builds.
# On EC2 set WEBSOCKET_ALLOWED_ORIGIN_PATTERNS=https://api.shivaprasadofficial.com
app.websocket.allowed-origin-patterns=${WEBSOCKET_ALLOWED_ORIGIN_PATTERNS:*}

# ─── CORS ────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8081}

# ─── HTTPS ───────────────────────────────────────────────────────────────────
app.https.enabled=${HTTPS_ENABLED:false}

# ─── Connection pool (Hikari) ────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=300000

# ─── Swagger (ADMIN role required — see SecurityConfig) ──────────────────────
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ─── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
